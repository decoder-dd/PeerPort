name: PeerPort CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smart-contracts:
    name: Soroban Smart Contracts CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Verify Code Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy Linter
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Smart Contract Unit Tests
        run: cargo test --target-dir target

  frontend:
    name: Next.js Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-id: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Run Eslint Linter
        working-directory: ./frontend
        run: npm run lint

      - name: Run Vitest Unit Tests
        working-directory: ./frontend
        run: npm run test

      - name: Build Next.js Production Bundle
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_STELLAR_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_MARKETPLACE_CONTRACT_ID: CDPEERPORTMARKETPLACE12345678901234567890123456789012345
